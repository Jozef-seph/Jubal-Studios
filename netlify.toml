# Jubal Studios — static site. Netlify serves HTTPS automatically for *.netlify.app and custom domains.
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    # Pragmatic CSP: scripts only from this origin (no inline JS). Inline styles allowed (used in HTML). Images from HTTPS CDNs (e.g. Unsplash).
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; frame-src https://www.youtube-nocookie.com https://www.youtube.com https://www.google.com https://maps.google.com; connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; form-action 'self' https://wa.me; object-src 'none'; upgrade-insecure-requests"
